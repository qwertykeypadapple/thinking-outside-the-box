<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Brand favicon — visual of "find your people" (the tagline).
    Two overlapping circles: each one is a person/mind. The intersection
    is where they meet — which is the entire product. fill-opacity 0.55
    on both makes the overlap region noticeably brighter via additive
    transparency, drawing the eye to the "meeting" exactly like the
    matching sidebar does in the app.

    Purple background matches CSS --accent (#5b21b6) and the OG image.
    Geometry chosen so the two circles + their intersection all remain
    visually distinct at 16x16 pixel rendering.
  -->
  <rect width="64" height="64" rx="14" fill="#5b21b6"/>
  <circle cx="22" cy="32" r="18" fill="#fafaf7" fill-opacity="0.55"/>
  <circle cx="42" cy="32" r="18" fill="#fafaf7" fill-opacity="0.55"/>
</svg>
