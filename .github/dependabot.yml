version: 2
# PLAN §8.5: Dependabot keeps supply-chain risk down by raising PRs against
# known-vulnerable or out-of-date deps. Groups patch+minor bumps into one PR
# per category so the firehose is manageable for a solo project.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types: ["patch", "minor"]
      development-dependencies:
        dependency-type: "development"
        update-types: ["patch", "minor"]
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
